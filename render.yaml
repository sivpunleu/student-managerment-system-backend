services:
  - type: web
    name: student-management-api
    runtime: docker
    plan: free
    region: singapore
    autoDeployTrigger: commit
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 1h
      - key: REFRESH_TOKEN_DAYS
        value: "30"
      - key: CORS_ORIGIN
        sync: false
      - key: APP_TIME_ZONE
        value: Asia/Bangkok
